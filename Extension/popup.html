<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:340px;min-height:180px;font-family:-apple-system,'Segoe UI',sans-serif;background:#080810;color:#ede9fe}
.header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #1f1c38}
.logo{width:28px;height:28px;border-radius:8px;object-fit:cover}
.app-name{font-size:15px;font-weight:700;color:#fff}
.badge{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:4px;background:#7c3aed22;color:#a78bfa;border:1px solid #7c3aed44}
.content{padding:14px}
#login-state{display:none;text-align:center;padding:20px 0}
#login-state p{font-size:13px;color:#7c6eaa;margin-bottom:12px}
#login-state a{display:inline-block;background:#7c3aed;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none}
#save-state{display:none}
.page-info{background:#0f0d1f;border-radius:10px;padding:10px 12px;margin-bottom:10px;border:1px solid #2a2448}
.page-title{font-size:12px;font-weight:600;color:#ede9fe;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-url{font-size:10px;color:#7c6eaa;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
textarea{width:100%;background:#0f0d1f;border:1px solid #2a2448;border-radius:8px;color:#ede9fe;font-size:12px;padding:8px 10px;resize:none;outline:none;font-family:inherit;height:58px;transition:border-color .15s}
textarea:focus{border-color:#7c3aed}
textarea::placeholder{color:#4b4270}
.save-btn{width:100%;margin-top:10px;background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.save-btn:hover{background:#6d28d9}
.save-btn:disabled{background:#2a2448;cursor:not-allowed}
#success-state{display:none;text-align:center;padding:24px 0}
.ok{width:48px;height:48px;border-radius:50%;background:#16a34a1a;border:2px solid #16a34a44;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px}
#success-state h3{font-size:14px;font-weight:700;color:#fff}
#success-state p{font-size:12px;color:#7c6eaa;margin-top:4px}
.view-btn{display:inline-block;margin-top:12px;background:#0f0d1f;color:#a78bfa;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;border:1px solid #7c3aed44}
.error-msg{font-size:11px;color:#f87171;margin-top:8px;padding:6px 8px;background:#f8717110;border-radius:6px;border:1px solid #f8717130;display:none}
.spinner{width:14px;height:14px;border-radius:50%;border:2px solid #ffffff30;border-top-color:#fff;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <img src="icons/icon16.png" class="logo" alt="" onerror="this.style.display='none'"/>
  <span class="app-name">Raven AI</span>
  <span class="badge" id="user-badge">···</span>
</div>
<div class="content">
  <div id="login-state">
    <p>Log in to Raven AI to save pages.</p>
    <a href="http://localhost:5173/login" target="_blank">Open Raven AI</a>
  </div>
  <div id="save-state">
    <div class="page-info">
      <div class="page-title" id="page-title">Loading…</div>
      <div class="page-url" id="page-url"></div>
    </div>
    <textarea id="note" placeholder="Add a note… (optional)"></textarea>
    <div class="error-msg" id="error-msg"></div>
    <button class="save-btn" id="save-btn">Save to Raven</button>
  </div>
  <div id="success-state">
    <div class="ok">✓</div>
    <h3>Saved to Raven!</h3>
    <p>AI is processing this page…</p>
    <a href="http://localhost:5173" target="_blank" class="view-btn">Open Raven →</a>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
